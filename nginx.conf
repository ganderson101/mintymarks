# Pass through Cloudflare's X-Forwarded-Proto when present (value: "https"),
# otherwise fall back to nginx's own $scheme ("http" for direct LAN access).
# This lets the backend set the cookie secure flag correctly in both cases:
#   Cloudflare tunnel → nginx: X-Forwarded-Proto=https → secure cookie ✓
#   LAN HTTP → nginx: no X-Forwarded-Proto header → $scheme="http" → non-secure cookie ✓
map $http_x_forwarded_proto $real_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static React build; fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → FastAPI backend (strips /api prefix to match FastAPI routes)
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $real_proto;
        # Forward cookies (required for httpOnly auth cookie)
        proxy_pass_header  Set-Cookie;
    }

    # Health check endpoint for Docker
    location /healthz {
        proxy_pass http://backend:8000/healthz;
    }
}
