# MintyMarks — Synology NAS deployment (local build, no registry required)
# Usage:
#   1. Copy this file + the repo to your NAS (see DEPLOY.md)
#   2. Create a .env file from .env.example and fill in all required values
#   3. docker compose -f docker-compose.nas.yml up -d --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_PATH: /data/mintymarks.db
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:?ALLOWED_ORIGINS must be set in .env (e.g. https://app.yourdomain.com)}"
      MINTYMARKS_SECRET: "${MINTYMARKS_SECRET:?MINTYMARKS_SECRET must be set in .env}"
    volumes:
      - db_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Port 3000 remains available for direct LAN access.
    # External (internet) access goes via cloudflared tunnel — no port forwarding needed.
    ports:
      - "${MINTYMARKS_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN must be set in .env}
    depends_on:
      - frontend

  # Nightly firm digest — fires at 21:00 Europe/London via busybox crond.
  # Sends one plain-text summary email to DIGEST_TO via Gmail SMTP.
  # Sending delegates to backend/email_sender.py (same provider as magic-link).
  # Logs to digest_logs volume; restart: unless-stopped with no crash loop.
  digest-cron:
    build:
      context: .
      dockerfile: Dockerfile.digest
    restart: unless-stopped
    environment:
      TZ: Europe/London
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-smtp}"
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:?SMTP_USER must be set (your Gmail address)}"
      SMTP_PASS: "${SMTP_PASS:?SMTP_PASS must be set (Gmail app password)}"
      EMAIL_FROM: "${EMAIL_FROM:-}"
      DIGEST_TO: "${DIGEST_TO:-ganderson101@gmail.com}"
      FRONTEND_URL: "${FRONTEND_URL:-https://app.mintymarks.com}"
      # Optional — Paperclip section is skipped gracefully if unset
      PAPERCLIP_API_URL: "${PAPERCLIP_API_URL:-}"
      PAPERCLIP_API_KEY: "${PAPERCLIP_API_KEY:-}"
      PAPERCLIP_COMPANY_ID: "${PAPERCLIP_COMPANY_ID:-}"
    volumes:
      - .:/app:ro
      - digest_logs:/var/log/mintymarks
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
    # SQLite persists across redeploys in this named volume.
    # Backup: docker run --rm -v mintymarks_db_data:/data -v $(pwd):/backup alpine tar czf /backup/mintymarks-backup.tar.gz /data
  digest_logs:
    # Nightly digest run logs. Inspect with:
    #   docker compose -f docker-compose.nas.yml exec digest-cron tail -f /var/log/mintymarks/digest.log
