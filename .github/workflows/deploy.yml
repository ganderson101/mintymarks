name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual triggers from GitHub UI

env:
  REGISTRY: ghcr.io
  # Automatically derived from the repo owner/name, lowercased (required by ghcr.io)
  REPO_LOWER: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build images & push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    outputs:
      # Pass the image tags to the deploy job
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Enable layer caching for faster rebuilds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/mindarc-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/mindarc-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Synology NAS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # optional: add approval gates in GitHub repo settings

    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to NAS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_SSH_PORT }}
          source: docker-compose.yml
          target: ~/mindarc

      - name: Pull & restart containers on NAS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_SSH_PORT }}
          script: |
            set -e
            cd ~/mindarc

            # Authenticate with ghcr.io using the PAT stored as a secret
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.NAS_USER }}" --password-stdin

            # Inject the lowercase repo name and secret key, then redeploy
            export GITHUB_REPOSITORY_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            export SECRET_KEY="${{ secrets.APP_SECRET_KEY }}"

            docker compose pull
            docker compose up -d --remove-orphans

            # Clean up dangling images to save disk space
            docker image prune -f
